<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator sederhana</title>
    <!-- Google Fonts: Poppins untuk tampilan modern dan elegan -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
  <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- Dekorasi latar belakang premium -->
    <div class="bg-decorations">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
        <div class="bubble bubble-4"></div>
        <div class="sparkle sparkle-1"></div>
        <div class="sparkle sparkle-2"></div>
    </div>

    <!-- Container Utama Kalkulator -->
    <div class="calculator-container">
        <!-- Bagian Atas / Header -->
        <div class="calculator-header">
            <span class="brand-name">Calc-by cintya</span>
            <div class="status-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Layar Display -->
        <div class="display">
            <!-- Menampilkan formula yang sedang ditulis -->
            <div class="display-formula" id="formula-screen"></div>
            <!-- Menampilkan angka inputan aktif atau hasil -->
            <div class="display-current" id="current-screen">0</div>
        </div>

        <!-- Grid Tombol Kalkulator -->
        <div class="buttons-grid">
            <!-- Baris 1 -->
            <button class="btn-function" onclick="clearAll()" title="Clear All (Escape)">AC</button>
            <button class="btn-function" onclick="deleteLast()" title="Backspace (Backspace)">
                <svg class="backspace-icon" viewBox="0 0 24 24">
                    <path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/>
                </svg>
            </button>
            <button class="btn-function" onclick="appendPercent()" title="Persen (%)">%</button>
            <button class="btn-operator" onclick="appendOperator('/')" title="Bagi (/)">÷</button>

            <!-- Baris 2 -->
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="btn-operator" onclick="appendOperator('*')" title="Kali (*)">×</button>

            <!-- Baris 3 -->
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="btn-operator" onclick="appendOperator('-')" title="Kurang (-)">−</button>

            <!-- Baris 4 -->
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="btn-operator" onclick="appendOperator('+')" title="Tambah (+)">+</button>

            <!-- Baris 5 -->
            <button onclick="appendNumber('0')">0</button>
            <button onclick="appendDecimal()">.</button>
            <button style="visibility: hidden; pointer-events: none;"></button> <!-- Spacer kosong agar layout seimbang -->
            <button class="btn-equals" onclick="calculate()" title="Sama Dengan (Enter)">=</button>
        </div>
    </div>

      <!-- hubungkan javascript-->
  <script src="script.js"></script>

</body>
</html>
